name: "Žán Bot"
description: "AI správce domu Žán — Telegram bot pro Home Assistant"
version: "5.10.0"
slug: "zan_bot"
init: false
arch:
  - amd64
  - aarch64
  - armv7
homeassistant_api: true
hassio_api: true
auth_api: true
ingress: false
startup: application
boot: auto
host_network: true
privileged:
  - NET_ADMIN
  - NET_RAW
map:
  - config:rw
options:
  TELEGRAM_TOKEN: ""
  CHAT_ID_ONDRA: ""
  CHAT_ID_JANA: ""
  EXTRA_CHAT_IDS: ""
  ZAN_HOME_NAME: "Dům Žán"
  CHAT_NAME_ONDRA: "Ondra"
  CHAT_NAME_JANA: "Jana"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  PLANTID_API_KEY: ""
  ZAN_HARNESS_ENABLED: false
  ZAN_HARNESS_CHAT_ID: 0
schema:
  TELEGRAM_TOKEN: str
  CHAT_ID_ONDRA: str
  CHAT_ID_JANA: str
  EXTRA_CHAT_IDS: str?
  ZAN_HOME_NAME: str?
  CHAT_NAME_ONDRA: str?
  CHAT_NAME_JANA: str?
  ANTHROPIC_API_KEY: str
  OPENAI_API_KEY: str
  PLANTID_API_KEY: str?
  ZAN_HARNESS_ENABLED: bool?
  ZAN_HARNESS_CHAT_ID: int?
